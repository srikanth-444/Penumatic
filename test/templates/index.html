<!DOCTYPE html>
<html>
<head>
    <title>Live Voltage Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .chart-container {
            width: 400px;
            height: 200px;
            display: inline-block;
            margin: 5px;
        }
        details {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h2>ESP32 Voltage Live Plots</h2>
    <div id="charts"></div>

    <script>
        const NUM_CHANNELS = 32;
        const GROUP_SIZE = 4;
        const charts = {};
        const container = document.getElementById('charts');

        for (let g = 0; g < NUM_CHANNELS / GROUP_SIZE; g++) {
            const startCh = g * GROUP_SIZE + 1;
            const endCh = startCh + GROUP_SIZE - 1;

            // Create collapsible group
            const details = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = `Limb ${g+1}`;
            details.appendChild(summary);
            
            
            // Add 4 charts to this group
            for (let i = 0; i < GROUP_SIZE; i++) {
                const ch = g * GROUP_SIZE + i;
                const titles=["pressure","vertical","horizantal","tactile"]
                const div = document.createElement('div');
                div.className = 'chart-container';
                const canvas = document.createElement('canvas');
                canvas.id = 'chart_' + ch;
                div.appendChild(canvas);
                details.appendChild(div);

                const ctx = canvas.getContext('2d');
                charts[ch] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: titles[i],
                            data: [],
                            borderColor: `hsl(${ch*7}, 70%, 50%)`,
                            borderWidth: 2,
                            fill: false
                        }]
                    },
                    options: {
                        animation: false,
                        responsive: true,
                        scales: {
                            x: { display: true, title: { display: true, text: 'Time' } },
                            y: { min: -5, max: 5, title: { display: true, text: 'Voltage (V)' } }
                        }
                    }
                });
            }

            container.appendChild(details);
        }

        // SocketIO connection
        const socket = io();

        socket.on('voltage_update', function(msg) {
            const now = new Date().toLocaleTimeString();
            msg.voltages.forEach((voltage, ch) => {
                const chart = charts[ch];
                chart.data.labels.push(now);
                chart.data.datasets[0].data.push(voltage);

                if (chart.data.labels.length > 10) {
                    chart.data.labels.shift();
                    chart.data.datasets[0].data.shift();
                }
                chart.update();
            });
        });
    </script>
</body>
</html>
